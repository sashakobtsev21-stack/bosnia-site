name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: qa gates (check · build · test · links · lint · dist audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Единый гейт-оркестратор: внутри прогоняет check · build · test
      # (enums·parity·photos·interlinks) · test:links · lint, затем аудит dist/
      # (SEO/hreflang/schema/a11y/perf/security) и печатает GO/NO-GO.
      # Выходит !=0 при критических находках → CI краснеет на регрессии.
      - name: QA gates (qa.mjs — GO/NO-GO)
        run: npm run qa
